<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Payzoris</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#000000" />
  <meta property="og:site_name" content="Payzoris" />
  <meta property="og:title" content="404 — Page Not Found | Payzoris" />
  <meta property="og:url" content="https://payzoris.lepem.xyz/404.html" />
  <link rel="canonical" href="https://payzoris.lepem.xyz/404.html" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><polygon points='16,2 28,9 28,23 16,30 4,23 4,9' fill='%23FFC000'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(120px, 20vw, 240px);
      font-weight: 400;
      line-height: 0.85;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .error-page h1 {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 400;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 16px;
    }
    .error-page p {
      font-family: var(--font-ui);
      font-size: 16px;
      color: var(--ash);
      max-width: 480px;
      margin: 0 auto 32px;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <section class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="error-actions">
        <a href="/" class="btn btn-accent btn-lg">GO HOME</a>
        <a href="/blog/" class="btn btn-ghost btn-lg">VISIT BLOG</a>
      </div>
    </div>
  </section>
</body>
</html>
